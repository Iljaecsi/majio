<!DOCTYPE html>
<html lang="ru" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F5F5FA" id="themeColor">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Majio - Подача показаний</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ========================================== -->
    <!-- ОСНОВНОЙ КОНТЕЙНЕР                         -->
    <!-- ========================================== -->
    <div class="app-container">
        
        <!-- ====================================== -->
        <!-- ШАПКА С ПРИВЕТСТВИЕМ И НАСТРОЙКАМИ      -->
        <!-- ====================================== -->
        <header class="app-header">
            <div class="header-top">
                <div class="greeting">
                    <span class="greeting-text" data-key="greeting">Здравствуйте,</span>
                    <h1>Majio</h1>
                </div>
                <div class="header-actions">
                    <!-- Кнопка переключения языка -->
                    <button class="icon-btn" id="langToggle" title="Switch language">
                        <i class="fas fa-globe"></i>
                    </button>
                    <!-- Кнопка переключения темы -->
                    <button class="icon-btn" id="themeToggle" title="Toggle theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <!-- Кнопка экспорта -->
                    <button class="icon-btn" id="exportBtn" title="Экспорт CSV">
                        <i class="fas fa-file-export"></i>
                    </button>
                    <!-- Кнопка очистки -->
                    <button class="icon-btn" id="clearAllBtn" title="Очистить всё">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Карточка статистики -->
            <div class="stats-card">
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalReadings">0</span>
                        <span class="stat-label" data-key="readings">показаний</span>
                    </div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalApartments">0</span>
                        <span class="stat-label" data-key="apartments">квартир</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- ====================================== -->
        <!-- ФОРМА ПОДАЧИ ПОКАЗАНИЙ                  -->
        <!-- ====================================== -->
        <section class="form-section">
            <div class="section-header">
                <h2><i class="fas fa-pen"></i> <span data-key="submit_title">Подать показания</span></h2>
                <span class="badge" data-key="new">Новое</span>
            </div>
            
            <form id="meterForm" novalidate>
                <!-- Поля ввода -->
                <div class="input-group">
                    <div class="input-field">
                        <i class="fas fa-hashtag input-icon"></i>
                        <input type="number" id="apartment" min="1" max="9999" required placeholder=" ">
                        <label data-key="apartment_label">Номер квартиры</label>
                    </div>
                    
                    <div class="input-field">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="name" maxlength="50" required placeholder=" ">
                        <label data-key="name_label">Ваше имя</label>
                    </div>
                </div>

                <!-- Счетчики -->
                <div class="meter-grid">
                    <div class="meter-card electricity">
                        <div class="meter-icon"><i class="fas fa-bolt"></i></div>
                        <div class="input-field small">
                            <input type="number" id="electricity" step="0.1" min="0" required placeholder=" ">
                            <label data-key="electricity_label">Электричество, кВт·ч</label>
                        </div>
                    </div>

                    <div class="meter-card water-cold">
                        <div class="meter-icon"><i class="fas fa-snowflake"></i></div>
                        <div class="input-field small">
                            <input type="number" id="waterCold" step="0.1" min="0" required placeholder=" ">
                            <label data-key="water_cold_label">Холодная вода, м³</label>
                        </div>
                    </div>

                    <div class="meter-card water-hot">
                        <div class="meter-icon"><i class="fas fa-fire"></i></div>
                        <div class="input-field small">
                            <input type="number" id="waterHot" step="0.1" min="0" required placeholder=" ">
                            <label data-key="water_hot_label">Горячая вода, м³</label>
                        </div>
                    </div>
                </div>

                <!-- Кнопка отправки -->
                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i>
                    <span data-key="submit_btn">Отправить показания</span>
                </button>
            </form>
        </section>

        <!-- ====================================== -->
        <!-- ИСТОРИЯ ПОКАЗАНИЙ                       -->
        <!-- ====================================== -->
        <section class="history-section">
            <div class="section-header">
                <h2><i class="fas fa-clock-rotate-left"></i> <span data-key="history_title">История</span></h2>
            </div>

            <div class="table-wrapper">
                <table id="readingsTable">
                    <thead>
                        <tr>
                            <th data-key="th_apartment">Квартира</th>
                            <th data-key="th_name">Имя</th>
                            <th>⚡</th>
                            <th>💧</th>
                            <th>🔥</th>
                            <th data-key="th_date">📅</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="readingsBody">
                        <!-- Данные через JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- ====================================== -->
        <!-- НИЖНЯЯ НАВИГАЦИЯ (TAB BAR)             -->
        <!-- ====================================== -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <i class="fas fa-home"></i>
                <span data-key="nav_home">Главная</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-chart-simple"></i>
                <span data-key="nav_stats">Статистика</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-user"></i>
                <span data-key="nav_profile">Профиль</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
