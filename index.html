<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Majio - Näitude esitamine</title>
    
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ========================================== -->
    <!-- ВЕРХНЯЯ ПАНЕЛЬ (STATUS BAR)                 -->
    <!-- ========================================== -->
    <div class="status-bar">
        <span class="time">9:41</span>
        <div class="status-icons">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- ОСНОВНОЙ КОНТЕЙНЕР                         -->
    <!-- ========================================== -->
    <div class="app-container">
        
        <!-- ====================================== -->
        <!-- ШАПКА С ПРИВЕТСТВИЕМ                    -->
        <!-- ====================================== -->
        <header class="app-header">
            <div class="header-top">
                <div class="greeting">
                    <span class="greeting-text">Tere,</span>
                    <h1>Majio</h1>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="exportBtn" title="Ekspordi CSV">
                        <i class="fas fa-file-export"></i>
                    </button>
                    <button class="icon-btn" id="clearAllBtn" title="Tühjenda kõik">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Карточка статистики -->
            <div class="stats-card">
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalReadings">0</span>
                        <span class="stat-label">näitu</span>
                    </div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalApartments">0</span>
                        <span class="stat-label">korterit</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- ====================================== -->
        <!-- ФОРМА ПОДАЧИ ПОКАЗАНИЙ                  -->
        <!-- ====================================== -->
        <section class="form-section">
            <div class="section-header">
                <h2><i class="fas fa-pen"></i> Esita näidud</h2>
                <span class="badge">Uus</span>
            </div>
            
            <form id="meterForm" novalidate>
                <!-- Поля ввода -->
                <div class="input-group">
                    <div class="input-field">
                        <i class="fas fa-hashtag input-icon"></i>
                        <input type="number" id="apartment" min="1" max="9999" required placeholder=" ">
                        <label>Korteri number</label>
                    </div>
                    
                    <div class="input-field">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="name" maxlength="50" required placeholder=" ">
                        <label>Teie nimi</label>
                    </div>
                </div>

                <!-- Счетчики -->
                <div class="meter-grid">
                    <div class="meter-card electricity">
                        <div class="meter-icon"><i class="fas fa-bolt"></i></div>
                        <div class="input-field small">
                            <input type="number" id="electricity" step="0.1" min="0" required placeholder=" ">
                            <label>Elektrienergia, kWh</label>
                        </div>
                    </div>

                    <div class="meter-card water-cold">
                        <div class="meter-icon"><i class="fas fa-snowflake"></i></div>
                        <div class="input-field small">
                            <input type="number" id="waterCold" step="0.1" min="0" required placeholder=" ">
                            <label>Külm vesi, m³</label>
                        </div>
                    </div>

                    <div class="meter-card water-hot">
                        <div class="meter-icon"><i class="fas fa-fire"></i></div>
                        <div class="input-field small">
                            <input type="number" id="waterHot" step="0.1" min="0" required placeholder=" ">
                            <label>Soe vesi, m³</label>
                        </div>
                    </div>
                </div>

                <!-- Кнопка отправки -->
                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i>
                    <span>Saada näidud</span>
                </button>
            </form>
        </section>

        <!-- ====================================== -->
        <!-- ИСТОРИЯ ПОКАЗАНИЙ                       -->
        <!-- ====================================== -->
        <section class="history-section">
            <div class="section-header">
                <h2><i class="fas fa-clock-rotate-left"></i> Ajalugu</h2>
            </div>

            <div class="table-wrapper">
                <table id="readingsTable">
                    <thead>
                        <tr>
                            <th>Korter</th>
                            <th>Nimi</th>
                            <th>⚡</th>
                            <th>💧</th>
                            <th>🔥</th>
                            <th>📅</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="readingsBody">
                        <!-- Данные через JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- ====================================== -->
        <!-- НИЖНЯЯ НАВИГАЦИЯ (TAB BAR)             -->
        <!-- ====================================== -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Avaleht</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-chart-simple"></i>
                <span>Statistika</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profiil</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
